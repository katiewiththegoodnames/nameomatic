<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name•O•Matic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400&family=Libre+Franklin:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:   #080334;
      --brown:  #502e05;
      --tan:    #ede2b9;
      --cream:  #f8eedc;
      --offwhite: #fdf8f0;
      --gold:   #a28a34;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Libre Franklin', 'Franklin Gothic Medium', Arial, sans-serif;
      background-color: var(--offwhite);
      background-image: radial-gradient(var(--tan) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--navy);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background-color: var(--navy);
      border-bottom: 3px solid var(--gold);
      padding: 16px 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-title {
      font-family: 'Arvo', 'Clarendon', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.02em;
    }

    .header-dot {
      color: var(--gold);
    }

    .header-tagline {
      font-family: 'Libre Franklin', Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
    }

    /* ── MAIN LAYOUT ── */
    .app {
      display: flex;
      flex-direction: column;
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── STARTERS ── */
    .starters {
      padding: 24px 0 16px;
    }

    .starters-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--brown);
      margin-bottom: 12px;
    }

    .starters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .starter-btn {
      background: var(--cream);
      border: 2px solid var(--navy);
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      text-align: left;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .starter-btn:hover {
      background: var(--tan);
      transform: translateY(-1px);
    }

    .starter-btn:active {
      transform: translateY(0);
    }

    .starter-letter {
      font-family: 'Arvo', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      flex-shrink: 0;
      min-width: 24px;
    }

    .starter-text {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.4;
      letter-spacing: 0.01em;
      padding-top: 2px;
    }

    /* ── CHAT AREA ── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-container:empty::before {
      content: '';
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-bubble {
      padding: 12px 16px;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .message.user .message-bubble {
      background: var(--navy);
      color: var(--cream);
      border: 2px solid var(--navy);
    }

    .message.bot .message-bubble {
      background: var(--tan);
      color: var(--navy);
      border: 2px solid var(--navy);
      border-left: 4px solid var(--gold);
    }

    .message-bubble p {
      margin-bottom: 0.6em;
    }

    .message-bubble p:last-child {
      margin-bottom: 0;
    }

    .message-bubble strong {
      font-weight: 700;
    }

    .message-bubble .caps-header {
      font-family: 'Arvo', Georgia, serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--brown);
      display: block;
      margin-bottom: 4px;
      margin-top: 10px;
    }

    .message-bubble .caps-header:first-child {
      margin-top: 0;
    }

    /* ── TYPING INDICATOR ── */
    .typing-indicator {
      display: none;
      align-self: flex-start;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-bubble {
      background: var(--tan);
      border: 2px solid var(--navy);
      border-left: 4px solid var(--gold);
      padding: 14px 20px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      border-top: 3px solid var(--gold);
      background: var(--cream);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-textarea {
      flex: 1;
      background: var(--offwhite);
      border: 2px solid var(--navy);
      color: var(--navy);
      font-family: 'Libre Franklin', Arial, sans-serif;
      font-size: 0.88rem;
      line-height: 1.5;
      padding: 10px 12px;
      resize: none;
      overflow: hidden;
      min-height: 44px;
      max-height: 140px;
      outline: none;
    }

    .input-textarea::placeholder {
      color: var(--gold);
      opacity: 0.7;
    }

    .input-textarea:focus {
      border-color: var(--gold);
    }

    .send-btn {
      background: var(--navy);
      border: 2px solid var(--navy);
      color: var(--cream);
      cursor: pointer;
      font-family: 'Arvo', Georgia, serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 10px 16px;
      white-space: nowrap;
      transition: background 0.15s;
      height: 44px;
      align-self: flex-end;
    }

    .send-btn:hover {
      background: var(--brown);
      border-color: var(--brown);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── DISCLAIMER ── */
    .disclaimer {
      background: var(--navy);
      color: var(--tan);
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      padding: 8px 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .disclaimer a {
      color: var(--gold);
      text-decoration: none;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .starters-grid {
        grid-template-columns: 1fr;
      }

      .header-title {
        font-size: 1.4rem;
      }

      .header-tagline {
        display: none;
      }

      .message {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="header-title">Name<span class="header-dot">•</span>O<span class="header-dot">•</span>Matic</span>
    <span class="header-tagline">by 26&thensome</span>
  </header>

  <div class="app">

    <div class="starters" id="starters">
      <div class="starters-label">How do you want to start?</div>
      <div class="starters-grid">
        <button class="starter-btn" onclick="handleStarter('Creative Brief: give me context first')">
          <span class="starter-letter">A</span>
          <span class="starter-text">Creative Brief: give me context first</span>
        </button>
        <button class="starter-btn" onclick="handleStarter('Browse A-Z Strategies')">
          <span class="starter-letter">B</span>
          <span class="starter-text">Browse A-Z Strategies</span>
        </button>
        <button class="starter-btn" onclick="handleStarter('Gut Check: What Would Katie Say?')">
          <span class="starter-letter">C</span>
          <span class="starter-text">Gut Check: What Would Katie Say?</span>
        </button>
        <button class="starter-btn" onclick="handleStarter('Surprise Me: gotta start somewhere')">
          <span class="starter-letter">D</span>
          <span class="starter-text">Surprise Me: gotta start somewhere</span>
        </button>
      </div>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="typing-indicator" id="typing">
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        class="input-textarea"
        id="input"
        placeholder="Type your message..."
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">SEND &rarr;</button>
    </div>

  </div>

  <footer class="disclaimer">
    For namestorming only. Not legal or trademark advice. Always consult a trademark attorney before going public. &nbsp;|&nbsp;
    <a href="https://26andthensome.com" target="_blank" rel="noopener">26andthensome.com</a>
  </footer>

  <script>
    const messages = [];

    function hideStarters() {
      const s = document.getElementById('starters');
      if (s) s.style.display = 'none';
    }

    function showTyping() {
      document.getElementById('typing').classList.add('visible');
      scrollToBottom();
    }

    function hideTyping() {
      document.getElementById('typing').classList.remove('visible');
    }

    function scrollToBottom() {
      const chat = document.getElementById('chat');
      chat.scrollTop = chat.scrollHeight;
    }

    function formatText(text) {
      // Escape HTML
      text = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Bold (**text**)
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // ALL-CAPS section headers (3+ words or lines that are full caps like "SOUND & FEEL:")
      const lines = text.split('\n');
      const processed = lines.map(line => {
        const trimmed = line.trim();
        // Match lines that are mostly caps and end with optional colon
        if (trimmed.length > 3 && trimmed === trimmed.toUpperCase() && /[A-Z]/.test(trimmed)) {
          return `<span class="caps-header">${trimmed}</span>`;
        }
        return line;
      });

      // Join and convert double newlines to paragraph breaks
      const rejoined = processed.join('\n');
      const paragraphs = rejoined.split(/\n\n+/);
      return paragraphs
        .map(p => {
          const inner = p.replace(/\n/g, '<br>');
          if (inner.trim()) return `<p>${inner}</p>`;
          return '';
        })
        .filter(Boolean)
        .join('');
    }

    function appendMessage(role, text) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = formatText(text);
      div.appendChild(bubble);
      chat.appendChild(div);
      scrollToBottom();
    }

    async function callAPI() {
      showTyping();
      document.getElementById('sendBtn').disabled = true;

      try {
        const res = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        const data = await res.json();
        hideTyping();

        if (data.error) {
          appendMessage('bot', 'Something went wrong. Try again.');
        } else {
          messages.push({ role: 'assistant', content: data.content });
          appendMessage('bot', data.content);
        }
      } catch (err) {
        hideTyping();
        appendMessage('bot', 'Connection issue. Check your network and try again.');
      }

      document.getElementById('sendBtn').disabled = false;
    }

    function handleStarter(text) {
      hideStarters();
      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      callAPI();
    }

    function handleSend() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      hideStarters();
      input.value = '';
      autoResize(input);

      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      callAPI();
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }
  </script>

</body>
</html>
